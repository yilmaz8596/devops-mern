apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      containers:
        - name: client
          image: frontend:latest
          ports:
            - containerPort: 5173
          # Note: VITE_API_URL is baked into the image at build time via --build-arg.
          # It cannot be injected here at runtime. Rebuild the image to change the API URL.
---
apiVersion: v1
kind: Service
metadata:
  name: client
spec:
  selector:
    app: client
  ports:
    - port: 80
      targetPort: 5173
  type: LoadBalancer  # Exposes the frontend externally via EC2 public IP
