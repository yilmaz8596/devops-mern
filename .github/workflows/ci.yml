
# CI pipeline: lints and builds both backend and frontend on every push/PR to main
name: build-and-lint 

# Triggers: run on push or pull_request targeting the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]


jobs: 
   build-and-lint:
      runs-on: ubuntu-latest  # Use a fresh Ubuntu runner provided by GitHub
  
      steps:
        # Step 1: Clone the repository into the runner so subsequent steps can access the code
        - name: Checkout repo
          uses: actions/checkout@v3
  
        # Step 2: Install the specified Node.js version on the runner
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
  
        # Step 3: Install backend dependencies using lockfile for reproducible installs
        - name: Install backend dependencies
          working-directory: server
          run: npm ci 
  
        # Step 4: Run ESLint on backend — fail if any warnings or errors are found
        - name: Lint backend
          working-directory: server
          run: npm run lint -- --max-warnings=0
  
        # Step 5: Install frontend dependencies using lockfile for reproducible installs
        - name: Install frontend dependencies
          working-directory: client
          run: npm ci

        # Step 6: Run ESLint on frontend — fail if any warnings or errors are found
        - name: Lint frontend
          working-directory: client
          run: npm run lint -- --max-warnings=0

        # Step 7: Build the backend Docker image to verify the Dockerfile is valid
        - name: Build backend image 
          run: docker build -t backend ./server

        # Step 8: Build the frontend Docker image to verify the Dockerfile and Vite build succeed
        - name: Build frontend image
          run: docker build -t frontend ./client

deploy:
   needs: build-and-lint  # Only run deploy if build-and-lint succeeds
   if: github.event_name == 'push'  # Only deploy on direct push to main, not PRs
   runs-on: ubuntu-latest
   
   env:
     EC2_HOST: ${{ secrets.EC2_HOST }}       # EC2 public IP stored in GitHub Secrets
     EC2_USER: ${{ secrets.EC2_USER }}       # SSH user (e.g. ubuntu or ec2-user)
     EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }} # Private SSH key stored in GitHub Secrets

   steps:
     # Step 1: Checkout code so we can copy docker-compose.yml to the server
     - name: Checkout repo
       uses: actions/checkout@v4

     # Step 2: Trust the EC2 host to prevent SSH from prompting for verification
     - name: Add EC2 host to known_hosts
       run: |
         mkdir -p ~/.ssh
         ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

     # Step 3: Write the private key to a file and lock down permissions
     - name: Set up SSH key
       run: |
         echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
         chmod 600 ~/.ssh/id_rsa

     # Step 4: Copy the latest docker-compose.yml and server .env to the EC2 instance
     - name: Copy files to EC2
       run: |
         scp -i ~/.ssh/id_rsa docker-compose.yml $EC2_USER@$EC2_HOST:~/app/
         scp -i ~/.ssh/id_rsa server/.env $EC2_USER@$EC2_HOST:~/app/server/

     # Step 5: SSH into EC2, pull latest images and restart all containers
     - name: Deploy on EC2
       run: |
         ssh -i ~/.ssh/id_rsa $EC2_USER@$EC2_HOST << 'EOF'
           cd ~/app
           docker-compose pull
           docker-compose up -d --build
           docker image prune -f
         EOF